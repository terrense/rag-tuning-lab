project:
  name: rag_tuning_lab

paths:
  corpus: data/interview_cards.jsonl
  docs_dir: data/docs
  eval_queries: data/eval_queries.yaml
  chunks_cache: storage/chunks_play_milvus.jsonl

source:
  include_interview_cards: true
  include_docs_dir: true

vector_store:
  type: milvus
  collection: rag_lab_play_milvus
  reset_on_ingest: true
  uri: storage/milvus/rag_lab_play.db
  token: ""
  metric: COSINE

embedding:
  provider: sentence-transformers
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  normalize: true

chunking:
  strategy: paragraph
  chunk_size: 360
  chunk_overlap: 80

retrieval:
  candidate_k: 12
  top_k: 5
  hybrid: true
  vector_weight: 0.7
  bm25_weight: 0.3
  rrf_k: 60

rerank:
  mode: cross_encoder
  model: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
  top_k: 5
  weight: 0.45

display:
  snippet_chars: 220
